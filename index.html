<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unofficial RA Wiki</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="home">

<!-- ================= HAMBURGER ================= -->
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

    <h3>RA Wiki</h3>

    <input type="text" id="search" placeholder="Search..." onkeyup="filterMenu()">

    <a class="nav-link" href="index.html">Home</a>

    <div class="group">
        <button onclick="toggleGroup(this)">▶ Guides</button>
        <div class="group-items">
            <a class="nav-link" href="guides.html">Getting Started</a>
        </div>
    </div>

    <div class="group">
        <button onclick="toggleGroup(this)">▶ Quests</button>
        <div class="group-items">
            <a class="nav-link" href="#">Beginner Quests</a>
            <a class="nav-link" href="#">Daily Quests</a>
        </div>
    </div>

    <div class="group">
        <button onclick="toggleGroup(this)">▶ Maps</button>
        <div class="group-items">
            <a class="nav-link" href="#">World Map</a>
            <a class="nav-link" href="#">Dungeons</a>
        </div>
    </div>

    <div class="group">
        <button onclick="toggleGroup(this)">▶ Info</button>
        <div class="group-items">
            <a class="nav-link" href="#">Classes</a>
            <a class="nav-link" href="#">Change Log</a>
        </div>
    </div>

</aside>

<!-- ================= HEADER ================= -->
<header>
    <nav>
        <a href="index.html">Home</a>
        <a href="guides.html">Guides</a>
        <a href="#">Maps</a>
        <a href="#">Quests</a>
    </nav>
</header>

<!-- ================= HERO ================= -->
<section class="hero">

    <img src="images/ra-banner.png" class="hero-title" alt="RA Wiki">

    <p class="start-text">
        Your unofficial guide to the world of RA.<br>
        Beginner friendly • Quests • Maps • Classes
    </p>

    <a class="button" href="guides.html">
        Start Here
    </a>

    <!-- ================= VIDEO ================= -->
    <div class="video-section">

        <img src="images/logo.png" class="trailer-logo" alt="Logo">

        <iframe
            src="https://www.youtube.com/embed/jdfFl1cbpvM"
            title="RA Trailer"
            allowfullscreen>
        </iframe>

    </div>

</section>

<!-- ================= JS ================= -->
<script>

// OPEN / CLOSE MENU
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

// DROPDOWN GROUPS
function toggleGroup(btn){
    btn.nextElementSibling.classList.toggle("open");
}

// SEARCH FILTER
function filterMenu(){
    const input = document.getElementById("search").value.toLowerCase();
    const links = document.querySelectorAll(".nav-link");

    links.forEach(link=>{
        link.style.display = link.textContent.toLowerCase().includes(input)
        ? "block"
        : "none";
    });
}

</script>

</body>
</html>
